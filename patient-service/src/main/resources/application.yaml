spring:
  application:
    name: patient-service

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:patient_service_db
    driver-class-name: org.h2.Driver
    username: sa
    password: 12345

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  sql:
    init:
      mode: always

server:
  port: 8081